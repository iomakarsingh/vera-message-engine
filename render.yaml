services:
  - type: web
    name: vera-message-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false
      - key: TEAM_NAME
        value: "Team Vera"
      - key: TEAM_MEMBER
        value: "Omkar Singh"
